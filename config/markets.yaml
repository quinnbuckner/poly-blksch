# Market screener and correlation-pair configuration.
# The screener (src/blksch/core/ingest/screener.py) selects markets to quote on.

screener:
  # Hard liquidity filters
  min_volume_24h_usd: 50000
  min_depth_usd_5pct: 500     # depth within 5% of mid
  min_spread_bps: 10          # exclude super-tight markets where edge is dead
  max_spread_bps: 500         # exclude super-wide / dead markets

  # Ranking
  top_n: 5                    # quote top N by composite score
  score_weights:
    volume: 0.5
    depth: 0.3
    spread_tightness: 0.2

  # Resolution horizon
  min_hours_to_resolution: 2
  max_days_to_resolution: 30  # avoid long-dated where belief-vol is tiny

  # Refresh
  rescreen_every_sec: 300

# Optional hints for the correlation estimator (paper §3.3, §5.4).
# The bot will still discover correlations from data; these are priors.
correlation_pair_hints: []
  # Example entries (fill in actual token_ids):
  # - pair: ["<token_id_A>", "<token_id_B>"]
  #   description: "Same election, complementary candidates"
  #   expected_rho_sign: negative
  # - pair: ["<token_id_A>", "<token_id_C>"]
  #   description: "Same sports league, same game outcomes"
  #   expected_rho_sign: positive

# Markets to explicitly exclude
blocklist_token_ids: []
